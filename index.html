<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swether - 爺爺奶奶營養切切樂</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fdfae7; font-family: "Microsoft JhengHei", sans-serif; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-size: cover; background-position: center; flex-direction: column; align-items: center; justify-content: flex-end; }
        .active { display: flex; }
        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; z-index: 5; background: transparent; }
        .btn { width: 85%; height: 15%; margin-bottom: 8%; cursor: pointer; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; z-index: 20; }
        #game-tips { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 3.5rem; color: #d35400; font-weight: 900; text-shadow: 3px 3px 0 white; pointer-events: none; z-index: 15; }
        #loading { display: flex; justify-content: center; align-items: center; background: #fdfae7; z-index: 100; font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading" class="screen active">👴 爺爺正在磨餐刀...</div>
    
    <div id="home" class="screen" onclick="showScreen('intro', 'intro')"><button class="btn"></button></div>
    <div id="intro" class="screen" onclick="startLevel(1)"><button class="btn"></button></div>
    <div id="gameContainer" class="screen"><div id="game-tips"></div><canvas id="gameCanvas"></canvas></div>
    <div id="result" class="screen"><button class="btn" onclick="location.reload()"></button></div>

    <script>
        const FISH_KEY = "2280183970ad46e9ae253e08db5e28c5"; 
        const VOICE_ID = "b20abfd2bc2741e0b61f02c54aa93dc3";
        const BASE = `https://raw.githubusercontent.com/alice55505-source/swether/main/`;
        
        // 確保路徑完全符合 GitHub 檔案列表
        const BG_MAP = {
            home: `${BASE}images/cover.jpg`, 
            intro: `${BASE}images/intro.jpg`,
            K1: `${BASE}images/K1.jpg`, 
            K2: `${BASE}images/K2.jpg`, 
            K3: `${BASE}images/K3.jpg`,
            result1: `${BASE}images/result1.jpg`, 
            result2: `${BASE}images/result2.jpg`, 
            result3: `${BASE}images/result3.jpg`
        };

        const sfx = { catch: new Audio(`${BASE}sounds/catch.mp3`) };
        let currentLevel = 1, scores = { 1:0, 2:0, 3:0 }, gameItems = [], isGaming = false, slashPoints = [];
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');

        async function speak(text) {
            try {
                const res = await fetch("https://api.fish.audio/v1/tts", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${FISH_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text, reference_id: VOICE_ID, format: "mp3" })
                });
                if(res.ok) {
                    const audio = new Audio(URL.createObjectURL(await res.blob()));
                    audio.play();
                }
            } catch (e) { console.log("語音跳過"); }
        }

        function showScreen(id, bgKey) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(bgKey) target.style.backgroundImage = `url('${BG_MAP[bgKey]}')`;
            target.classList.add('active');
        }

        function startLevel(level) {
            currentLevel = level;
            showScreen('gameContainer', 'K' + level);
            initLevel();
        }

        function initLevel() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            document.getElementById('game-tips').innerText = ["", "第一關：切蛋白質", "第二關：切蔬菜", "第三關：切澱粉"][currentLevel];
            speak(["", "先吃肉肉長肌肉", "再吃青菜好順暢", "最後吃飯有力氣"][currentLevel]);

            isGaming = true; gameItems = [];
            requestAnimationFrame(updateLoop);
            const spawnTimer = setInterval(() => { if(!isGaming) clearInterval(spawnTimer); else spawnFood(); }, 1200);

            setTimeout(() => {
                isGaming = false;
                if(currentLevel < 3) startLevel(currentLevel + 1);
                else finishGame();
            }, 10000);
        }

        function spawnFood() {
            gameItems.push({
                x: Math.random() * (canvas.width - 100) + 50, y: canvas.height + 50,
                vy: -15, vx: (Math.random() - 0.5) * 4,
                emoji: ["", "🥩", "🥦", "🍚"][currentLevel], sliced: false
            });
        }

        function updateLoop() {
            if(!isGaming && slashPoints.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製白色劃痕 (刀
