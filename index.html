<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swether - 營養切切樂</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fdfae7; font-family: sans-serif; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-size: cover; background-position: center; flex-direction: column; align-items: center; justify-content: flex-end; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .active { display: flex; }
        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; z-index: 5; cursor: crosshair; }
        .btn { width: 85%; height: 15%; margin-bottom: 12%; cursor: pointer; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; z-index: 20; background-size: 100% 100%; background-repeat: no-repeat; background-position: center; }
        .btn.locked { cursor: not-allowed; }
        #game-tips { display: none !important; }
        #loading { display: flex; justify-content: center; align-items: center; background: #fdfae7; z-index: 100; font-size: 1.5rem; font-weight: bold; cursor: pointer; }

        /* 音效授權頁 */
        #soundPermissionOverlay {
            display: flex;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff8e7;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 32px 24px;
            box-sizing: border-box;
        }
        #soundPermissionBox {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        #soundPermissionBox .sound-icon {
            font-size: 5rem;
            margin-bottom: 16px;
        }
        #soundPermissionBox h2 {
            margin: 0 0 16px;
            font-size: 2rem;
            color: #1a5fa8;
            font-weight: 900;
            line-height: 1.3;
        }
        #soundPermissionBox .volume-hint {
            font-size: 1.6rem;
            font-weight: bold;
            color: #c0392b;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        #sp-allow {
            display: block;
            width: 100%;
            padding: 22px 0;
            border: none;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            box-shadow: 0 6px 20px rgba(39,174,96,0.45);
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 2px;
        }
        #sp-allow:active { transform: scale(0.97); }


        /* 難度選擇浮層 */
        #difficultyOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 9998;
            justify-content: center;
            align-items: center;
        }
        #difficultyBox {
            background: #fff8e7;
            border-radius: 28px;
            padding: 36px 28px 32px;
            width: 88%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        #difficultyBox h2 {
            margin: 0 0 8px;
            font-size: 1.9rem;
            font-weight: 900;
            color: #1a5fa8;
        }
        #difficultyBox p {
            margin: 0 0 28px;
            font-size: 1.1rem;
            color: #666;
        }
        .diff-btn {
            display: block;
            width: 100%;
            padding: 20px 0;
            margin-bottom: 16px;
            border: none;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .diff-btn:active { transform: scale(0.96); }
        #btn-novice {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            box-shadow: 0 6px 18px rgba(39,174,96,0.4);
        }
        #btn-expert {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 6px 18px rgba(231,76,60,0.4);
        }
    </style>
</head>
<body>

    <!-- 🔊 音效授權彈窗（第一次開啟時顯示） -->
    <div id="soundPermissionOverlay">
        <div id="soundPermissionBox">
            <div class="sound-icon">🔊</div>
            <h2>開始前請先<br>調高手機音量！</h2>
            <div class="volume-hint">📢 請把音量轉到最大<br>才能聽到遊戲聲音</div>
            <button id="sp-allow" onclick="grantSoundPermission()" ontouchstart="grantSoundPermission()">✅ 開始遊戲</button>
        </div>
    </div>
    <!-- 難度選擇浮層 -->
    <div id="difficultyOverlay">
        <div id="difficultyBox">
            <h2>選擇難度</h2>
            <p>請選擇你的挑戰模式</p>
            <button class="diff-btn" id="btn-novice" onclick="chooseDifficulty('novice')" ontouchstart="chooseDifficulty('novice')">🌱 新手</button>
            <button class="diff-btn" id="btn-expert" onclick="chooseDifficulty('expert')" ontouchstart="chooseDifficulty('expert')">🔥 高手</button>
        </div>
    </div>
    <div id="home" class="screen active"><button class="btn"></button></div>
    <div id="intro" class="screen">
        <button id="startBtn" class="btn locked" disabled style="cursor:not-allowed;"></button>
    </div>
    <div id="k1Screen" class="screen">
        <button id="k1StartBtn" class="btn locked" onclick="playSfx('click'); startLevel(1)" disabled style="cursor:default;"></button>
    </div>
    <div id="gameContainer" class="screen"><div id="game-tips"><span class="title"></span><span class="subtitle"></span></div><canvas id="gameCanvas"></canvas></div>
    <div id="betweenLevel" class="screen"><button id="nextLevelBtn" class="btn locked" onclick="onBetweenLevelClick()" disabled style="cursor:default;"></button></div>
    <div id="result" class="screen">
        <canvas id="confettiCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;"></canvas>
        <div id="result-score" style="
            position: absolute; top: 33%; left: 50%; transform: translateX(-50%);
            font-size: 5rem; font-weight: 900;
            pointer-events: none; z-index: 20; white-space: nowrap;
        "></div>
        <button class="btn" onclick="location.reload()"></button>
    </div>

    <script>
        // ── 音效授權系統 ──────────────────────────────────────────────
        let soundPermissionGranted = false;

        let grantFired = false;
        function grantSoundPermission() {
            if (grantFired) return;
            grantFired = true;
            soundPermissionGranted = true;

            // 同步建立 AudioContext（必須在手勢事件的同步範圍內）
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (AC && !actx) actx = new AC();
                if (actx) actx.resume().catch(() => {});
            } catch(e) {}

            // 靜音音檔解鎖 iOS 靜音開關
            try {
                const silentAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
                silentAudio.volume = 0.01;
                silentAudio.play().catch(() => {});
            } catch(e) {}

            // 在手勢當下預先建立並解鎖 bgmAudio 和 cheerAudio
            try {
                if (!bgmAudio) {
                    bgmAudio = new Audio(`${BASE}sounds/bgm.mp3`);
                    bgmAudio.loop = true;
                    bgmAudio.volume = 0;
                }
                bgmAudio.play().then(() => {
                    bgmAudio.pause();
                    bgmAudio.currentTime = 0;
                    bgmAudio.volume = 0.4;
                }).catch(() => {});
            } catch(e) {}

            try {
                if (!cheerAudio) {
                    cheerAudio = new Audio(`${BASE}sounds/cheer.mp3`);
                    cheerAudio.volume = 0;
                }
                // 播一下再暫停，讓 iOS 記住授權
                cheerAudio.play().then(() => {
                    cheerAudio.pause();
                    cheerAudio.currentTime = 0;
                    cheerAudio.volume = 0.6;
                }).catch(() => {});
            } catch(e) {}

            // 立刻關閉彈窗
            const overlay = document.getElementById('soundPermissionOverlay');
            overlay.style.transition = 'opacity 0.4s';
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);

            // 音效背景載入，載完後正式播 BGM
            audioInitialized = true;
            initAudioPool().then(() => startBgm()).catch(() => {});
        }

        function denySoundPermission() {
            soundPermissionGranted = false;
            const overlay = document.getElementById('soundPermissionOverlay');
            overlay.style.transition = 'opacity 0.4s';
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }

        // ── 難度設定 ──────────────────────────────────────────────
        let difficulty = 'novice'; // 'novice' | 'expert'

        let diffChosen = false;
        function chooseDifficulty(mode) {
            if (diffChosen) return;
            diffChosen = true;
            difficulty = mode;
            document.getElementById('difficultyOverlay').style.display = 'none';
            playSfx('click');
            showScreen('intro', 'intro');
            setTimeout(() => { diffChosen = false; }, 800);
        }

        function showDifficultyOverlay() {
            document.getElementById('difficultyOverlay').style.display = 'flex';
        }

        const FISH_KEY = "2280183970ad46e9ae253e08db5e28c5"; 
        const VOICE_ID = "b20abfd2bc2741e0b61f02c54aa93dc3";
        const BASE = `https://raw.githubusercontent.com/alice55505-source/swether/main/`;
        
        const BG_MAP = {
            home: `${BASE}images/cover.jpg`, intro: `${BASE}images/intro.jpg`,
            K1: `${BASE}images/K1.jpg`, K2: `${BASE}images/K2.jpg`, K3: `${BASE}images/K3.jpg`,
            result1: `${BASE}images/result1.jpg`, result2: `${BASE}images/result2.jpg`, result3: `${BASE}images/result3.jpg`,
        };

        // ── 音訊系統 ────────────────────────────────────────────────
        // SFX（Web Audio，低延遲）
        let actx = null, sfxBuffers = {}, sfxReady = false;

        async function initAudioPool() {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            // 重用已存在的 actx，不重新建立（避免丟失手勢授權）
            if (!actx) actx = new AC();
            await actx.resume();
            const files = {
                click: 'click.mp3', catch: 'catch.mp3', wrong: 'wrong.mp3',
                bad: 'bad.mp3', good: 'good.mp3',
                perfect: 'perfect.mp3', normal: 'normal.mp3', ended: 'ended.mp3'
            };
            await Promise.all(Object.entries(files).map(async ([key, file]) => {
                try {
                    const arr = await fetch(`${BASE}sounds/${file}`).then(r => r.arrayBuffer());
                    sfxBuffers[key] = await new Promise((res, rej) => actx.decodeAudioData(arr, res, rej));
                } catch(e) { console.warn('sfx load fail:', key, e); }
            }));
            sfxReady = true;
        }

        function playSfx(name, vol = 1) {
            if (!actx || !sfxBuffers[name]) return;
            try {
                const src = actx.createBufferSource();
                src.buffer = sfxBuffers[name];
                const gain = actx.createGain();
                gain.gain.value = vol;
                src.connect(gain).connect(actx.destination);
                src.start(0);
            } catch(e) { console.warn('sfx play err', e); }
        }

        // 向下相容的 catch 音效呼叫
        function playCatchSound() { playSfx('catch'); }

        // BGM 和 cheer 用 <audio> 標籤播放（iOS 相容性較佳）
        let bgmAudio = null;
        let bgmPlaying = false;
        let cheerAudio = null;

        function startBgm() {
            if (bgmPlaying) return;
            // bgmAudio 已在手勢授權時建立，直接播
            if (!bgmAudio) {
                bgmAudio = new Audio(`${BASE}sounds/bgm.mp3`);
                bgmAudio.loop = true;
                bgmAudio.volume = 0.4;
            }
            bgmAudio.volume = 0.4;
            bgmAudio.currentTime = 0;
            bgmAudio.play().then(() => {
                bgmPlaying = true;
            }).catch(() => {});
        }

        function stopBgm() {
            if (bgmAudio) {
                bgmAudio.pause();
                bgmAudio.currentTime = 0;
            }
            bgmPlaying = false;
        }

        // 手機瀏覽器需要用戶手勢才能解鎖 AudioContext
        let audioInitialized = false;
        function ensureAudio() {
            if (actx && actx.state === 'suspended') {
                actx.resume().catch(() => {});
            }
        }

        let currentLevel = 1;
        let scores = { 1: 0, 2: 0, 3: 0 };
        let gameItems = [];
        let isGaming = false;
        let loopRunning = false;
        let spawnTimerId = null;
        let levelEndTimerId = null;
        let slashPoints = [];
        let isPointerDown = false;

        // ── 新分數系統 ──────────────────────────────────────────────
        // 每關固定出 15 題正確食物，切對 +20，切錯 -10
        // 三關總分最低 100（結算時套用封底）
        const SCORE_PER_HIT = 50;
        const SCORE_PENALTY = 10;
        let correctSpawnCount = 0;  // 本關已出現的正確食物數（保留供難度比例使用）

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function showScreen(id, bgKey) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');

            // intro 頁：直接顯示背景並解鎖按鈕
            if (id === 'intro') {
                target.style.backgroundImage = `url('${BG_MAP.intro}')`;
                const btn = document.getElementById('startBtn');
                btn.onclick = () => { playSfx('click'); showK1Screen(); };
                btn.disabled = false;
                btn.classList.remove('locked');
                btn.style.pointerEvents = 'auto';
                btn.style.cursor = 'pointer';
            } else {
                if (bgKey) target.style.backgroundImage = `url('${BG_MAP[bgKey]}')`;
            }
        }

        function initGame() {
            // 初始化 canvas 尺寸（平板 / 大螢幕）
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // load 時只設背景，不播音樂（手機需等用戶手勢）
            const home = document.getElementById('home');
            home.style.backgroundImage = `url('${BG_MAP.home}')`;
        }
        window.addEventListener('load', initGame);

        // iOS LINE WebView 相容：用 touchstart + click 雙保險綁定首頁點擊
        (function() {
            let homeFired = false;
            async function homeHandler(e) {
                e.preventDefault();
                if (homeFired) return;
                homeFired = true;
                await ensureAudio();
                playSfx('click');
                showDifficultyOverlay();
                setTimeout(() => { homeFired = false; }, 500);
            }
            const homeEl = document.getElementById('home');
            homeEl.addEventListener('touchstart', homeHandler, { passive: false });
            homeEl.addEventListener('click', homeHandler);
        })();

        // 過渡畫面已改用 BG_MAP，BETWEEN_BG 已移除

        let voiceMuted = false;

        function stopCurrentLevel() {
            if (spawnTimerId !== null) { clearInterval(spawnTimerId); spawnTimerId = null; }
            if (levelEndTimerId !== null) { clearTimeout(levelEndTimerId); levelEndTimerId = null; }
            isGaming = false;
        }

        function showK1Screen() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const k1 = document.getElementById('k1Screen');
            k1.style.backgroundImage = `url('${BG_MAP.K1}')`;
            k1.classList.add('active');
            const btn = document.getElementById('k1StartBtn');
            btn.disabled = false;
            btn.classList.remove('locked');
            btn.style.pointerEvents = 'auto';
            btn.style.cursor = 'pointer';
        }

        function showBetweenLevel() {
            playSfx('good');
            if (currentLevel < 3) {
                const colorBg = currentLevel === 1 ? BG_MAP.K2 : BG_MAP.K3;
                document.getElementById('betweenLevel').style.backgroundImage = `url('${colorBg}')`;
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('betweenLevel').classList.add('active');
                const btn = document.getElementById('nextLevelBtn');
                btn.disabled = false;
                btn.classList.remove('locked');
                btn.style.pointerEvents = 'auto';
                btn.style.cursor = 'pointer';
            } else {
                finishGame();
            }
        }

        function onBetweenLevelClick() {
            playSfx('click');
            startLevel(currentLevel + 1);
        }

        function startLevel(level) {
            stopCurrentLevel();

            currentLevel = level;
            scores[currentLevel] = 0;
            correctSpawnCount = 0;  // 重置本關正確食物計數

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const gc = document.getElementById('gameContainer');
            gc.style.backgroundImage = `url('${GAME_BG[0]}')`;
            gc.classList.add('active');

            // FIX 6: only resize canvas when dimensions actually changed to avoid wiping ctx state mid-game
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            const tipTitles = ["", "第一關：優質蛋白質 🥩", "第二關：新鮮蔬菜 🥦", "第三關：健康澱粉 🍚"];
            const tipSubs  = ["",
                "切正確的蛋白質食物！其他都不要切",
                "切新鮮蔬菜！其他都不要切",
                "切健康澱粉食物！其他都不要切"
            ];
            document.querySelector('#game-tips .title').textContent   = tipTitles[currentLevel];
            document.querySelector('#game-tips .subtitle').textContent = tipSubs[currentLevel];

            // 所有關卡語音都在各自說明/過渡頁播完，進遊戲不重複播

            gameItems = [];
            slashPoints = [];
            isGaming = true;

            // FIX 2: only start loop if not already running
            if (!loopRunning) {
                loopRunning = true;
                requestAnimationFrame(updateLoop);
            }

            const spawnInterval = difficulty === 'expert' ? 1200 : 1500;
            spawnTimerId = setInterval(() => {
                if (isGaming) spawnFood();
            }, spawnInterval);

            levelEndTimerId = setTimeout(() => {
                stopCurrentLevel();
                setTimeout(() => showBetweenLevel(), 600);
            }, 30000);
        }

        // ── 食物資料庫（emoji → 中文名稱）──────────────────────────
        const FOOD_NAMES = {
            "🐟":"鮭魚","🦐":"蝦子","🐠":"旗魚",
            "🍗":"雞肉","🥚":"雞蛋","🥩":"瘦牛肉","🥛":"鮮乳","🍶":"優格",
            "🧀":"起司","🦪":"牡蠣","🥜":"花生",
            "🥦":"花椰菜","🥕":"紅蘿蔔","🥬":"青菜","🍅":"番茄",
            "🧅":"洋蔥","🥒":"小黃瓜","🌿":"菠菜","🍄":"香菇",
            "🍠":"地瓜","🥔":"馬鈴薯","🎃":"南瓜","🌽":"玉米","🥣":"燕麥","🍚":"糙米",
            "🫓":"雜糧餅","🍞":"全麥麵包",
            "🌭":"熱狗","🍔":"漢堡","🥓":"培根","🍟":"薯條",
            "🍰":"蛋糕","🍩":"甜甜圈","🧁":"杯子蛋糕","🍪":"餅乾"
        };

        // 每關正確食物
        const LEVEL_CORRECT = [
            null,
            ["🐟","🦐","🐠","🍗","🥚","🥩","🥛","🍶","🧀","🦪","🥜"],
            ["🥦","🥕","🥬","🍅","🧅","🥒","🌿","🍄"],
            ["🍠","🥔","🎃","🌽","🥣","🍚","🫓","🍞"]
        ];

        const BAD_FOODS = ["🌭","🍔","🥓","🍟","🍰","🍩","🧁","🍪"];

        function buildWrongPool(level) {
            let pool = [...BAD_FOODS];
            for (let l = 1; l <= 3; l++) {
                if (l !== level) pool = pool.concat(LEVEL_CORRECT[l]);
            }
            return pool;
        }
        const WRONG_POOL = [null, buildWrongPool(1), buildWrongPool(2), buildWrongPool(3)];

        let floatingTexts = [];
        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, alpha: 1.0, vy: -2.0 });
        }

        // 動態背景（bg0=等待, bg1=切對, bg2=切其他健康食物, bg3=切壞食物）
        const GAME_BG = [
            `${BASE}images/bg0.jpg`,
            `${BASE}images/bg1.jpg`,
            `${BASE}images/bg2.jpg`,
            `${BASE}images/bg3.jpg`
        ];
        let bgResetTimer = null;
        function setGameBg(idx) {
            document.getElementById('gameContainer').style.backgroundImage = `url('${GAME_BG[idx]}')`;
            if (bgResetTimer) clearTimeout(bgResetTimer);
            if (idx !== 0) {
                bgResetTimer = setTimeout(() => {
                    document.getElementById('gameContainer').style.backgroundImage = `url('${GAME_BG[0]}')`;
                }, 1500);
            }
        }

        // 防重疊：把畫面橫切成幾個格子，輪流從不同格子出現
        let spawnSlotIndex = 0;

        function spawnFood() {
            // 難度參數
            const isExpert = difficulty === 'expert';
            const wrongChance = isExpert ? 0.55 : 0.40;
            const fallBase   = isExpert ? 1.0  : 0.6;
            const fallRange  = isExpert ? 0.6  : 0.4;
            const driftRange = isExpert ? 0.6  : 0.3;

            const isWrong = Math.random() < wrongChance;
            if (!isWrong) correctSpawnCount++;
            const pool = isWrong ? WRONG_POOL[currentLevel] : LEVEL_CORRECT[currentLevel];
            const emoji = pool[Math.floor(Math.random() * pool.length)];
            const isBad = BAD_FOODS.includes(emoji);

            const FOOD_SIZE = 120;
            const SLOTS = 4;  // 把畫面切成 4 個格子
            const slotW = canvas.width / SLOTS;
            // 在目前格子內隨機偏移，確保不超出邊界
            const slotX = (spawnSlotIndex % SLOTS) * slotW;
            const margin = FOOD_SIZE / 2 + 10;
            const xMin = Math.max(margin, slotX + margin);
            const xMax = Math.min(canvas.width - margin, slotX + slotW - margin);
            const x = xMin + Math.random() * Math.max(0, xMax - xMin);
            spawnSlotIndex = (spawnSlotIndex + 1) % SLOTS;

            const fallSpeed = fallBase + Math.random() * fallRange;

            // 輕微左右漂移
            const vx = (Math.random() - 0.5) * driftRange;

            gameItems.push({
                x: x,
                y: -120,  // FOOD_SIZE=120
                vy: fallSpeed,
                vx: vx,
                gravity: 0,
                emoji: emoji,
                label: FOOD_NAMES[emoji] || "",
                isWrong: isWrong,
                isBad: isBad,
                sliced: false,
                fadeAlpha: 1.0
            });
        }

        function updateLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFlash();

            // --- Slash trail ---
            if (slashPoints.length > 1) {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "white";
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 12;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(slashPoints[0].x, slashPoints[0].y);
                for (let i = 1; i < slashPoints.length; i++) {
                    ctx.lineTo(slashPoints[i].x, slashPoints[i].y);
                }
                ctx.stroke();
                ctx.restore();
                slashPoints.shift();
            }

            // --- Items ---
            for (let i = gameItems.length - 1; i >= 0; i--) {
                const it = gameItems[i];
                it.y += it.vy;
                it.x += it.vx;
                it.vy += (it.gravity ?? 0.22);

                // 輕微左右漂移，到邊界就反向
                const FSIZE = 60;
                if (it.x < FSIZE || it.x > canvas.width - FSIZE) { it.vx *= -1; }

                ctx.textAlign = "center";

                if (it.sliced) {
                    // 切半動畫：左半往左飛、右半往右飛，各自旋轉淡出
                    if (!it.sliceVx) {
                        // 初始化切片速度（只執行一次）
                        it.sliceVx  = 4 + Math.random() * 2;   // 水平飛散速度
                        it.sliceVyL = -3 - Math.random() * 2;  // 左半往上
                        it.sliceVyR = -3 - Math.random() * 2;  // 右半往上
                        it.rotL     = 0;
                        it.rotR     = 0;
                        it.sliceX   = it.x;  // 固定切割時的位置
                        it.sliceY   = it.y;
                        it.halfOffX = 0;
                        it.halfOffYL = 0;
                        it.halfOffYR = 0;
                    }
                    it.halfOffX  += it.sliceVx;
                    it.halfOffYL += it.sliceVyL; it.sliceVyL += 0.35;
                    it.halfOffYR += it.sliceVyR; it.sliceVyR += 0.35;
                    it.rotL -= 0.07;
                    it.rotR += 0.07;
                    it.fadeAlpha = Math.max(0, it.fadeAlpha - 0.018);

                    const ESIZE = 120;
                    const drawHalf = (side) => {
                        // side: 'left' | 'right'
                        const offX = side === 'left' ? -it.halfOffX : it.halfOffX;
                        const offY = side === 'left' ? it.halfOffYL : it.halfOffYR;
                        const rot  = side === 'left' ? it.rotL : it.rotR;
                        const cx   = it.sliceX + offX;
                        const cy   = it.sliceY + offY;

                        ctx.save();
                        ctx.globalAlpha = it.fadeAlpha;
                        ctx.translate(cx, cy);
                        ctx.rotate(rot);

                        // clip 只顯示左半或右半
                        ctx.beginPath();
                        if (side === 'left') {
                            ctx.rect(-ESIZE, -ESIZE, ESIZE, ESIZE * 2);
                        } else {
                            ctx.rect(0, -ESIZE, ESIZE, ESIZE * 2);
                        }
                        ctx.clip();

                        ctx.font = `${ESIZE}px Arial`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(it.emoji, 0, 0);
                        ctx.restore();
                    };

                    drawHalf('left');
                    drawHalf('right');

                    if (it.fadeAlpha <= 0 || it.sliceY + it.halfOffYL > canvas.height + 100) {
                        gameItems.splice(i, 1);
                    }
                } else {
                    ctx.font = "120px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(it.emoji, it.x, it.y);

                    // 食物名稱標籤（白底圓角，小字）
                    if (it.label) {
                        ctx.font = "bold 22px sans-serif";
                        ctx.textBaseline = "alphabetic";
                        const tw = ctx.measureText(it.label).width;
                        const pad = 10, labelY = it.y + 72;
                        ctx.save();
                        ctx.fillStyle = "rgba(255,255,255,0.95)";
                        ctx.beginPath();
                        ctx.roundRect(it.x - tw/2 - pad, labelY - 22, tw + pad*2, 30, 8);
                        ctx.fill();
                        ctx.fillStyle = "#000";
                        ctx.textAlign = "center";
                        ctx.fillText(it.label, it.x, labelY);
                        ctx.restore();
                    }

                    if (it.y > canvas.height + 100) {
                        gameItems.splice(i, 1);
                    }
                }
            }

            // --- Floating score texts ---
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.alpha = Math.max(0, ft.alpha - 0.022);
                ctx.save();
                ctx.globalAlpha = ft.alpha;
                ctx.font = "bold 48px sans-serif";
                ctx.textAlign = "center";
                ctx.fillStyle = ft.color;
                ctx.shadowColor = "white";
                ctx.shadowBlur = 8;
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }

            // --- Score display（右上角，關卡名稱 + 得分各一行）---
            const levelNames = { 1: '🥩 蛋白質', 2: '🥦 蔬菜', 3: '🍚 澱粉' };
            const levelName = levelNames[currentLevel] || '';
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.7)";
            ctx.shadowBlur = 4;
            const totalSoFar = scores[1] + scores[2] + scores[3];
            const scoreText = "得分：" + totalSoFar;
            const pad = 16;

            // 第一行：關卡名稱
            ctx.font = "bold 32px sans-serif";
            const lw = ctx.measureText(levelName).width;
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.beginPath();
            ctx.roundRect(canvas.width - lw - pad * 2 - 8, 8, lw + pad * 2, 44, 10);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "right";
            ctx.fillText(levelName, canvas.width - pad, 42);

            // 第二行：得分
            ctx.font = "bold 40px sans-serif";
            const sw = ctx.measureText(scoreText).width;
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.beginPath();
            ctx.roundRect(canvas.width - sw - pad * 2 - 8, 58, sw + pad * 2, 48, 10);
            ctx.fill();
            ctx.fillStyle = "#ffe066";
            ctx.textAlign = "right";
            ctx.fillText(scoreText, canvas.width - pad, 95);
            ctx.restore();

            // FIX 2: keep loop alive while gaming OR while items/trail still visible
            if (isGaming || gameItems.length > 0 || slashPoints.length > 0 || floatingTexts.length > 0) {
                requestAnimationFrame(updateLoop);
            } else {
                loopRunning = false;
            }
        }

        // --- FIX 4: Unified pointer handling (touch + mouse) ---
        let pointerStartX = 0, pointerStartY = 0;

        function onPointerStart(x, y) {
            isPointerDown = true;
            pointerStartX = x;
            pointerStartY = y;
            slashPoints = [];
        }

        function sliceAt(x, y) {
            for (const it of gameItems) {
                if (!it.sliced && Math.hypot(it.x - x, it.y - y) < 70) {
                    it.sliced = true;
                    if (it.isWrong) {
                        scores[currentLevel] = Math.max(0, scores[currentLevel] - SCORE_PENALTY);
                        if (it.isBad) {
                            scores[currentLevel] = Math.max(0, scores[currentLevel] - SCORE_PENALTY); // 額外再扣一次（共-20）
                            spawnFloatingText(it.x, it.y - 70, `-20 ❌`, "#e74c3c");
                            flashScreen("rgba(231,76,60,0.3)");
                            setGameBg(3);
                            playSfx('bad');
                        } else {
                            spawnFloatingText(it.x, it.y - 70, `-${SCORE_PENALTY} ⚠️`, "#e67e22");
                            flashScreen("rgba(230,126,34,0.25)");
                            setGameBg(2);
                            playSfx('wrong');
                        }
                    } else {
                        scores[currentLevel] += SCORE_PER_HIT;
                        spawnFloatingText(it.x, it.y - 70, `+${SCORE_PER_HIT} ✨`, "#27ae60");
                        setGameBg(1);
                        playSfx('catch');
                    }
                }
            }
        }

        function onPointerMove(x, y) {
            if (!isPointerDown) return;
            slashPoints.push({ x, y });
            sliceAt(x, y);
        }

        function onPointerEnd(x, y) {
            isPointerDown = false;
            // 點按判斷：移動距離 < 30px 視為點擊，直接切割點按位置
            if (x !== undefined && y !== undefined) {
                const dist = Math.hypot(x - pointerStartX, y - pointerStartY);
                if (dist < 30) {
                    sliceAt(x, y);
                }
            }
        }

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            onPointerStart(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            onPointerMove(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const t = e.changedTouches[0];
            onPointerEnd(t.clientX, t.clientY);
        }, { passive: false });

        // FIX 4: Mouse events for desktop support
        canvas.addEventListener('mousedown', (e) => onPointerStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', (e) => onPointerEnd(e.clientX, e.clientY));
        canvas.addEventListener('mouseleave', (e) => onPointerEnd(e.clientX, e.clientY));

        // Red/flash overlay for wrong food
        let flashAlpha = 0;
        let flashColor = "rgba(231,76,60,0.35)";
        function flashScreen(color) {
            flashAlpha = 1.0;
            flashColor = color;
        }
        // Draw flash in updateLoop — inject just before score display
        // (handled inline below via the flashAlpha variable)

        function drawFlash() {
            if (flashAlpha <= 0) return;
            ctx.save();
            ctx.globalAlpha = flashAlpha;
            ctx.fillStyle = flashColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            flashAlpha = Math.max(0, flashAlpha - 0.06);
        }


        // ── 灑花系統 ──────────────────────────────────────────────
        let confettiAnimId = null;
        let confettiParticles = [];

        let confettiRafId = null;
        let confettiIntervalId = null;

        function startConfetti() {
            stopConfetti();
            const cc = document.getElementById('confettiCanvas');
            cc.width = window.innerWidth;
            cc.height = window.innerHeight;
            const cx = cc.getContext('2d');
            confettiParticles = [];
            const colors = ['#f94144','#f3722c','#f8961e','#f9c74f','#90be6d','#43aa8b','#577590','#c77dff','#ff99c8'];

            function spawnBurst() {
                for (let i = 0; i < 12; i++) {
                    confettiParticles.push({
                        x: Math.random() * cc.width,
                        y: -10,
                        w: 8 + Math.random() * 10,
                        h: 4 + Math.random() * 6,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        vx: (Math.random() - 0.5) * 3,
                        vy: 2 + Math.random() * 3,
                        rot: Math.random() * Math.PI * 2,
                        rotV: (Math.random() - 0.5) * 0.2
                    });
                }
            }

            confettiIntervalId = setInterval(spawnBurst, 180);
            spawnBurst();

            function loop() {
                cx.clearRect(0, 0, cc.width, cc.height);
                for (let i = confettiParticles.length - 1; i >= 0; i--) {
                    const p = confettiParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.rotV;
                    if (p.y > cc.height + 20) { confettiParticles.splice(i, 1); continue; }
                    cx.save();
                    cx.translate(p.x, p.y);
                    cx.rotate(p.rot);
                    cx.fillStyle = p.color;
                    cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    cx.restore();
                }
                confettiRafId = requestAnimationFrame(loop);
            }
            loop();
        }

        function stopConfetti() {
            if (confettiIntervalId) { clearInterval(confettiIntervalId); confettiIntervalId = null; }
            if (confettiRafId) { cancelAnimationFrame(confettiRafId); confettiRafId = null; }
            const cc = document.getElementById('confettiCanvas');
            if (cc) cc.getContext('2d').clearRect(0, 0, cc.width, cc.height);
            confettiParticles = [];
        }

        function finishGame() {
            stopBgm();
            const rawTotal = scores[1] + scores[2] + scores[3];
            const finalScore = Math.max(100, rawTotal);  // 保底 100，無上限
            const resKey = finalScore >= 500 ? 'result1' : (finalScore >= 300 ? 'result2' : 'result3');
            const sfxName = 'cheer';  // 不論結果都播歡呼音效
            showScreen('result', resKey);
            stopConfetti();
            if (resKey === 'result1') setTimeout(startConfetti, 300);
            const scoreColors = { result1: '#1a5fa8', result2: '#1a7a2e', result3: '#c0392b' };
            const scoreEl = document.getElementById('result-score');
            scoreEl.textContent = finalScore;
            scoreEl.style.color = scoreColors[resKey];
            scoreEl.style.textShadow = `2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white`;
            // 用 <audio> 播歡呼音效（iOS 相容性最佳）
            setTimeout(() => {
                try {
                    if (!cheerAudio) {
                        cheerAudio = new Audio(`${BASE}sounds/cheer.mp3`);
                    }
                    cheerAudio.currentTime = 0;
                    cheerAudio.volume = 0.6;
                    cheerAudio.play().catch(() => {});
                } catch(e) {}
            }, 300);
        }

        // Handle window resize gracefully
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cc = document.getElementById('confettiCanvas');
            if (cc) { cc.width = window.innerWidth; cc.height = window.innerHeight; }
        });

        // 頁面隱藏或關閉時停止所有聲音
        function stopAllAudio() {
            stopBgm();
            if (actx) {
                try { actx.suspend(); } catch(e) {}
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopAllAudio();
        });
        window.addEventListener('pagehide', stopAllAudio);
        window.addEventListener('beforeunload', stopAllAudio);
    </script>
</body>
