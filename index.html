<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swether - 爺爺奶奶營養切切樂</title>
    <style>
        :root { --p-color: #ff7675; --v-color: #55efc4; --s-color: #ffeaa7; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fdfae7; font-family: "Microsoft JhengHei", sans-serif; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-size: cover; background-position: center; flex-direction: column; align-items: center; justify-content: flex-end; }
        .active { display: flex; }
        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .btn { width: 85%; height: 12%; margin-bottom: 8%; cursor: pointer; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
        
        /* 衛教型結算面板 */
        .result-panel {
            position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%);
            width: 82%; background: rgba(255, 255, 255, 0.95); border-radius: 25px;
            padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center;
        }
        .report-title { font-size: 1.4rem; color: #2d3436; margin-bottom: 12px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .step-row { display: flex; align-items: center; margin: 10px 0; padding: 10px; border-radius: 12px; text-align: left; }
        .step-1 { background: rgba(255, 118, 117, 0.1); border-left: 6px solid var(--p-color); }
        .step-2 { background: rgba(85, 239, 196, 0.1); border-left: 6px solid var(--v-color); }
        .step-3 { background: rgba(255, 234, 167, 0.1); border-left: 6px solid var(--s-color); }
        .step-icon { font-size: 2.5rem; margin-right: 12px; }
        .step-info b { font-size: 1.1rem; color: #333; display: block; }
        .step-score { margin-left: auto; font-size: 1.4rem; font-weight: 900; color: #d35400; }
        #game-tips { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 2.2rem; color: #d35400; font-weight: 900; text-shadow: 2px 2px 0 white; pointer-events: none; z-index: 10; }
        .how-to-play { position: absolute; bottom: 22%; color: #555; font-weight: bold; font-size: 1.1rem; background: rgba(255,255,255,0.7); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="loading" class="screen active">👴 爺爺正在磨餐刀...</div>
    <div id="home" class="screen" onclick="showScreen('intro', 'intro')"><button class="btn"></button></div>
    <div id="intro" class="screen" onclick="startLevel(1)">
        <div class="how-to-play">👆 玩法：用手指滑動切開食物</div>
        <button class="btn"></button>
    </div>
    <div id="gameContainer" class="screen"><div id="game-tips"></div><canvas id="gameCanvas"></canvas></div>
    <div id="transition" class="screen"><button id="nextBtn" class="btn"></button></div>
    <div id="result" class="screen">
        <div class="result-panel">
            <div class="report-title">🌟 爺爺的健康餐盤 🌟</div>
            <div class="step-row step-1"><div class="step-icon">🥩</div><div class="step-info"><b>1. 蛋白質</b><small>先吃肉肉長肌肉</small></div><div id="r1" class="step-score">0</div></div>
            <div class="step-row step-2"><div class="step-icon">🥦</div><div class="step-info"><b>2. 新鮮蔬菜</b><small>再吃菜菜好順暢</small></div><div id="r2" class="step-score">0</div></div>
            <div class="step-row step-3"><div class="step-icon">🍚</div><div class="step-info"><b>3. 健康澱粉</b><small>最後吃飯有氣力</small></div><div id="r3" class="step-score">0</div></div>
            <p style="margin-top:10px; color:#e17055; font-weight:bold;">💡 順序：肉 ➔ 菜 ➔ 飯 最健康！</p>
        </div>
        <button class="btn" onclick="location.reload()"></button>
    </div>

    <script>
        // --- Fish Audio 配置 ---
        const FISH_AUDIO_KEY = "2280183970ad46e9ae253e08db5e28c5"; 
        const VOICE_ID = "b20abfd2bc2741e0b61f02c54aa93dc3";

        const BASE = `https://raw.githubusercontent.com/alice55505-source/swether/main/`;
        const IMG = (n) => `${BASE}images/${n}`;
        const SND = (n) => `${BASE}sounds/${n}`;

        const BG_MAP = {
            home: IMG("cover.jpg"), intro: IMG("intro.jpg"),
            K1: IMG("K1.jpg"), K2: IMG("K2.jpg"), K3: IMG("K3.jpg"),
            result1: IMG("result1.jpg"), result2: IMG("result2.jpg"), result3: IMG("result3.jpg")
        };

        const sfx = {
            click: new Audio(SND("click.mp3")), catch: new Audio(SND("catch.mp3")),
            bad: new Audio(SND("bad.mp3")), perfect: new Audio(SND("good.mp3")),
            normal: new Audio(SND("click.mp3")), ended: new Audio(SND("wrong.mp3"))
        };

        const FOOD_POOL = {
            1: ['🥩', '🍗', '🥚', '🍤', '🐟'], 2: ['🥦', '🥬', '🥕', '🌽', '🥗'],
            3: ['🍚', '🍞', '🍜', '🍠', '🍙'], bad: ['🍟', '🍩', '🥤', '🍰', '🍔']
        };

        const LEVEL_TEXT = { 1: "第一關：切蛋白質", 2: "第二關：切新鮮蔬菜", 3: "第三關：切健康澱粉" };

        let currentLevel = 1, scores = { 1:0, 2:0, 3:0 }, gameItems = [], isGaming = false, spawnTimer;
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');

        // Fish Audio 語音串接函式
        async function speak(text) {
            try {
                const response = await fetch("https://api.fish.audio/v1/tts", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${FISH_AUDIO_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        text: text,
                        reference_id: VOICE_ID,
                        format: "mp3"
                    })
                });
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play();
            } catch (e) {
                console.error("語音生成失敗", e);
                // 備援方案：使用內建發音
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW';
                window.speechSynthesis.speak(msg);
            }
        }

        function showScreen(id, bgKey) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(bgKey) target.style.backgroundImage = `url('${BG_MAP[bgKey]}')`;
            target.classList.add('active');
        }

        function startLevel(level) {
            currentLevel = level;
            showScreen('transition', 'K' + level);
            document.getElementById('nextBtn').onclick = () => initLevel();
        }

        function initLevel() {
            showScreen('gameContainer');
            document.getElementById('game-tips').innerText = LEVEL_TEXT[currentLevel];
            
            const tips = { 1: "先吃肉肉長肌肉！", 2: "再吃青菜好順暢！", 3: "最後吃飯有力氣！" };
            speak(tips[currentLevel]);

            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            gameItems = []; isGaming = true;
            clearInterval(spawnTimer);
            spawnTimer = setInterval(spawnFood, 1750); // 為老人調整的舒適節奏
            updateLoop();
            setTimeout(() => {
                isGaming = false; clearInterval(spawnTimer);
                if(currentLevel < 3) startLevel(currentLevel + 1);
                else finishGame();
            }, 15000);
        }

        function spawnFood() {
            if(!isGaming) return;
            const isBad = Math.random() > 0.85;
            const pool = isBad ? FOOD_POOL.bad : FOOD_POOL[currentLevel];
            gameItems.push({
                x: Math.random() * (canvas.width - 120) + 60, y: canvas.height + 60,
                vy: -(Math.random() * 3 + 8), vx: (Math.random() - 0.5) * 2,
                emoji: pool[Math.floor(Math.random() * pool.length)], isBad, sliced: false
            });
        }

        function updateLoop() {
            if(!isGaming) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            gameItems.forEach((it, i) => {
                it.y += it.vy; it.x += it.vx; it.vy += 0.12;
                ctx.font = "85px Arial"; ctx.textAlign = "center";
                if(it.sliced) {
                    ctx.globalAlpha = 0.3;
                    ctx.fillText(it.emoji, it.x - 35, it.y); ctx.fillText(it.emoji, it.x + 35, it.y);
                    ctx.globalAlpha = 1;
                } else { ctx.fillText(it.emoji, it.x, it.y); }
                if(it.y > canvas.height + 150) gameItems.splice(i, 1);
            });
            requestAnimationFrame(updateLoop);
        }

        canvas.addEventListener('touchmove', (e) => {
            if(!isGaming) return;
            const t = e.touches[0], rect = canvas.getBoundingClientRect();
            const tx = t.clientX - rect.left, ty = t.clientY - rect.top;
            gameItems.forEach(it => {
                if(!it.sliced && Math.hypot(it.x - tx, it.y - ty) < 85) { // 加大判定至 85
                    it.sliced = true;
                    if(it.isBad) { sfx.bad.play(); scores[currentLevel] = Math.max(0, scores[currentLevel] - 5); }
                    else { sfx.catch.play(); scores[currentLevel] += 10; }
                }
            });
        });

        function finishGame() {
            const total = scores[1] + scores[2] + scores[3];
            document.getElementById('r1').innerText = scores[1];
            document.getElementById('r2').innerText = scores[2];
            document.getElementById('r3').innerText = scores[3];
            let bgKey = total >= 80 ? 'result1' : (total >= 40 ? 'result2' : 'result3');
            showScreen('result', bgKey);
            
            if(total >= 80) { speak("太厲害了，你吃得非常健康！一百分！"); sfx.perfect.play(); }
            else if(total >= 40) { speak("做得不錯，記得先吃肉再吃菜喔！"); sfx.normal.play(); }
            else { speak("我們要再加油，順序吃對才健康喔！"); sfx.ended.play(); }
        }

        window.onload = () => {
            const img = new Image(); img.src = BG_MAP.home;
            img.onload = () => { document.getElementById('loading').style.display = 'none'; showScreen('home', 'home'); };
        };
    </script>
</body>
</html>
