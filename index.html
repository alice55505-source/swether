<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swether - 營養切切樂</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fdfae7; font-family: sans-serif; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-size: cover; background-position: center; flex-direction: column; align-items: center; justify-content: flex-end; }
        .active { display: flex; }
        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; z-index: 5; cursor: crosshair; }
        .btn { width: 85%; height: 15%; margin-bottom: 12%; cursor: pointer; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; z-index: 20; position: relative; }
        .btn::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .btn.locked::after { opacity: 1; }
        #game-tips { display: none !important; }
        #loading { display: flex; justify-content: center; align-items: center; background: #fdfae7; z-index: 100; font-size: 1.5rem; font-weight: bold; cursor: pointer; }

        /* 音效授權頁 */
        #soundPermissionOverlay {
            display: flex;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff8e7;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 32px 24px;
            box-sizing: border-box;
        }
        #soundPermissionBox {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        #soundPermissionBox .sound-icon {
            font-size: 5rem;
            margin-bottom: 16px;
        }
        #soundPermissionBox h2 {
            margin: 0 0 16px;
            font-size: 2rem;
            color: #1a5fa8;
            font-weight: 900;
            line-height: 1.3;
        }
        #soundPermissionBox .volume-hint {
            font-size: 1.6rem;
            font-weight: bold;
            color: #c0392b;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        #sp-allow {
            display: block;
            width: 100%;
            padding: 22px 0;
            border: none;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            box-shadow: 0 6px 20px rgba(39,174,96,0.45);
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 2px;
        }
        #sp-allow:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <!-- 🔊 音效授權彈窗（第一次開啟時顯示） -->
    <div id="soundPermissionOverlay">
        <div id="soundPermissionBox">
            <div class="sound-icon">🔊</div>
            <h2>開始前請先<br>調高手機音量！</h2>
            <div class="volume-hint">📢 請把音量轉到最大<br>才能聽到遊戲聲音</div>
            <button id="sp-allow" onclick="grantSoundPermission()">✅ 開始遊戲</button>
        </div>
    </div>
    <div id="home" class="screen active" onclick="ensureAudio(); playSfx('click'); showScreen('intro', 'intro')"><button class="btn"></button></div>
    <div id="intro" class="screen">
        <button id="startBtn" class="btn locked" disabled style="cursor:not-allowed;"></button>
    </div>
    <div id="k1Screen" class="screen">
        <button id="k1StartBtn" class="btn locked" onclick="playSfx('click'); startLevel(1)" disabled style="cursor:default;"></button>
    </div>
    <div id="gameContainer" class="screen"><div id="game-tips"><span class="title"></span><span class="subtitle"></span></div><canvas id="gameCanvas"></canvas></div>
    <div id="betweenLevel" class="screen"><button id="nextLevelBtn" class="btn locked" onclick="onBetweenLevelClick()" disabled style="cursor:default;"></button></div>
    <div id="result" class="screen">
        <div id="result-score" style="
            position: absolute; top: 42%; left: 50%; transform: translateX(-50%);
            font-size: 5rem; font-weight: 900;
            pointer-events: none; z-index: 20; white-space: nowrap;
        "></div>
        <button class="btn" onclick="location.reload()"></button>
    </div>

    <script>
        // ── 音效授權系統 ──────────────────────────────────────────────
        let soundPermissionGranted = false;

        async function grantSoundPermission() {
            soundPermissionGranted = true;
            const overlay = document.getElementById('soundPermissionOverlay');

            // 立即觸發 AudioContext（需在用戶手勢事件內）
            const AC = window.AudioContext || window.webkitAudioContext;
            if (AC) {
                if (!actx) actx = new AC();
                await actx.resume().catch(()=>{});
            }

            // 嘗試播放一段靜音 audio 來解鎖手機靜音開關（iOS Silent Mode）
            try {
                const silentAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
                silentAudio.volume = 0.01;
                await silentAudio.play();
            } catch(e) { /* 忽略 */ }

            // 關閉授權彈窗
            overlay.style.transition = 'opacity 0.4s';
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);

            // 在手勢解鎖後才開始載入音檔並播 BGM
            audioInitialized = true;
            await initAudioPool();
            startBgm();
        }

        function denySoundPermission() {
            soundPermissionGranted = false;
            const overlay = document.getElementById('soundPermissionOverlay');
            overlay.style.transition = 'opacity 0.4s';
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }

        const FISH_KEY = "2280183970ad46e9ae253e08db5e28c5"; 
        const VOICE_ID = "b20abfd2bc2741e0b61f02c54aa93dc3";
        const BASE = `https://raw.githubusercontent.com/alice55505-source/swether/main/`;
        
        const BG_MAP = {
            home: `${BASE}images/cover.jpg`, intro: `${BASE}images/intro.jpg`,
            K1: `${BASE}images/K1.jpg`,
            result1: `${BASE}images/result1.jpg`, result2: `${BASE}images/result2.jpg`, result3: `${BASE}images/result3.jpg`
        };

        // ── 音訊系統 ────────────────────────────────────────────────
        // SFX（Web Audio，低延遲）
        let actx = null, sfxBuffers = {}, sfxReady = false;

        async function initAudioPool() {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            // 重用已存在的 actx，不重新建立（避免丟失手勢授權）
            if (!actx) actx = new AC();
            await actx.resume();
            const files = {
                click: 'click.mp3', catch: 'catch.mp3', wrong: 'wrong.mp3',
                bad: 'bad.mp3', good: 'good.mp3',
                perfect: 'perfect.mp3', normal: 'normal.mp3', ended: 'ended.mp3',
                voice_intro:   'voice_intro.mp3',
                voice_k1:      'voice_k1.mp3',
                voice_k2:      'voice_k2.mp3',
                voice_k3:      'voice_k3.mp3',
                voice_good1:   'voice_good1.mp3',
                voice_good2:   'voice_good2.mp3',
                voice_bad1:    'voice_bad1.mp3',
                voice_wrong1:  'voice_wrong1.mp3',
                voice_wrong2:  'voice_wrong2.mp3',
                voice_perfect: 'voice_perfect.mp3',
                voice_normal:  'voice_normal.mp3',
                voice_ended:   'voice_ended.mp3'
            };
            await Promise.all(Object.entries(files).map(async ([key, file]) => {
                try {
                    const arr = await fetch(`${BASE}sounds/${file}`).then(r => r.arrayBuffer());
                    sfxBuffers[key] = await new Promise((res, rej) => actx.decodeAudioData(arr, res, rej));
                } catch(e) { console.warn('sfx load fail:', key, e); }
            }));
            sfxReady = true;
        }

        function playSfx(name, vol = 1) {
            if (!actx || !sfxBuffers[name]) return;
            // 關卡切換緩衝期：封鎖隨機回饋語音，避免和說明語音重疊
            if (voiceMuted && (name.startsWith('voice_good') || name.startsWith('voice_bad') || name.startsWith('voice_wrong'))) return;
            try {
                const src = actx.createBufferSource();
                src.buffer = sfxBuffers[name];
                const gain = actx.createGain();
                gain.gain.value = vol;
                src.connect(gain).connect(actx.destination);
                src.start(0);
            } catch(e) { console.warn('sfx play err', e); }
        }

        // 向下相容的 catch 音效呼叫
        function playCatchSound() { playSfx('catch'); }

        // BGM 用 <audio> 標籤播放
        let bgmAudio = null;
        let bgmPlaying = false;

        function startBgm() {
            if (bgmPlaying) return;
            if (!bgmAudio) {
                bgmAudio = new Audio();
                bgmAudio.loop = true;
                bgmAudio.volume = 0.4;
                bgmAudio.crossOrigin = "anonymous";
                bgmAudio.src = `${BASE}sounds/bgm.mp3`;
            }
            bgmAudio.play().then(() => {
                bgmPlaying = true;
                console.log('BGM started ✅');
            }).catch(e => {
                console.warn('BGM start error:', e);
                // CORS 失敗時不用 crossOrigin 再試一次
                bgmAudio = new Audio(`${BASE}sounds/bgm.mp3`);
                bgmAudio.loop = true;
                bgmAudio.volume = 0.4;
                bgmAudio.play().then(() => { bgmPlaying = true; }).catch(()=>{});
            });
        }

        function stopBgm() {
            if (bgmAudio) {
                bgmAudio.pause();
                bgmAudio.currentTime = 0;
            }
            bgmPlaying = false;
        }

        // 手機瀏覽器需要用戶手勢才能解鎖 AudioContext
        let audioInitialized = false;
        async function ensureAudio() {
            if (!audioInitialized) {
                audioInitialized = true;
                await initAudioPool();
            }
            if (actx && actx.state === 'suspended') {
                await actx.resume().catch(()=>{});
            }
        }

        let currentLevel = 1;
        let scores = { 1: 0, 2: 0, 3: 0 };
        let gameItems = [];
        let isGaming = false;
        let loopRunning = false;
        let spawnTimerId = null;
        let levelEndTimerId = null;
        let slashPoints = [];
        let isPointerDown = false;
        // 正確率追蹤
        let totalFoods = 0;   // 全部出現的食物數
        let correctCount = 0; // 正確行為數（切到好食物 + 沒切壞食物）

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // speak() 播放人聲，新人聲出現時自動切斷上一個
        let currentVoiceSource = null;
        let currentVoiceGain = null;

        function speak(sfxKey) {
            if (!sfxKey || !actx || !sfxBuffers[sfxKey]) return;
            // 切斷上一個人聲
            if (currentVoiceSource) {
                try {
                    if (currentVoiceGain) {
                        currentVoiceGain.gain.setValueAtTime(0, actx.currentTime);
                    }
                    currentVoiceSource.stop();
                } catch(e) {}
                currentVoiceSource = null;
                currentVoiceGain = null;
            }
            try {
                const src = actx.createBufferSource();
                src.buffer = sfxBuffers[sfxKey];
                const gain = actx.createGain();
                gain.gain.value = 1.0;
                src.connect(gain).connect(actx.destination);
                src.start(0);
                src.onended = () => {
                    if (currentVoiceSource === src) {
                        currentVoiceSource = null;
                        currentVoiceGain = null;
                    }
                };
                currentVoiceSource = src;
                currentVoiceGain = gain;
            } catch(e) { console.warn('speak err', e); }
        }

        function getSfxDuration(key) {
            if (sfxBuffers[key] && sfxBuffers[key].duration > 0) return sfxBuffers[key].duration;
            return 3;
        }

        function playVoiceThenUnlock(voiceKey, btnId, minWaitMs) {
            const btn = document.getElementById(btnId);
            if (!btn) { console.warn('btn not found:', btnId); return; }
            btn.disabled = true;
            btn.classList.add('locked');
            btn.style.cursor = 'default';
            btn.style.pointerEvents = 'none';
            const doPlay = () => {
                speak(voiceKey);
                const dur = getSfxDuration(voiceKey);
                const wait = Math.max(dur * 1000, minWaitMs || 2000) + 500;
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.remove('locked');
                    btn.style.cursor = 'pointer';
                    btn.style.pointerEvents = 'auto';
                }, wait);
            };
            if (sfxBuffers[voiceKey]) { doPlay(); }
            else {
                const iv = setInterval(() => {
                    if (sfxBuffers[voiceKey]) { clearInterval(iv); doPlay(); }
                }, 200);
            }
        }

        function showScreen(id, bgKey) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if (bgKey) target.style.backgroundImage = `url('${BG_MAP[bgKey]}')`;
            target.classList.add('active');

            // intro 頁：播 voice_intro，播完解鎖開始按鈕
            if (id === 'intro') {
                const btn = document.getElementById('startBtn');
                btn.onclick = () => { playSfx('click'); showK1Screen(); };
                playVoiceThenUnlock('voice_intro', 'startBtn', 2000);
            }
        }

        function initGame() {
            // load 時只設背景，不播音樂（手機需等用戶手勢）
            const home = document.getElementById('home');
            home.style.backgroundImage = `url('${BG_MAP.home}')`;
        }
        window.addEventListener('load', initGame);

        // 過渡畫面圖（第1關結束→K2.jpg, 第2關結束→K3.jpg）
        const BETWEEN_BG = { 0: `${BASE}images/K1.jpg`, 1: `${BASE}images/K2.jpg`, 2: `${BASE}images/K3.jpg` };

        let voiceMuted = false;

        function stopCurrentLevel() {
            if (spawnTimerId !== null) { clearInterval(spawnTimerId); spawnTimerId = null; }
            if (levelEndTimerId !== null) { clearTimeout(levelEndTimerId); levelEndTimerId = null; }
            isGaming = false;
            // 靜音隨機語音回饋，避免和說明語音重疊
            voiceMuted = true;
            setTimeout(() => { voiceMuted = false; }, 3000);
        }

        function showK1Screen() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const k1 = document.getElementById('k1Screen');
            k1.style.backgroundImage = `url('${BG_MAP.K1}')`;
            k1.classList.add('active');
            playVoiceThenUnlock('voice_k1', 'k1StartBtn', 2000);
        }

        function showBetweenLevel() {
            playSfx('good');
            if (currentLevel < 3) {
                const bg = BETWEEN_BG[currentLevel];
                document.getElementById('betweenLevel').style.backgroundImage = `url('${bg}')`;
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('betweenLevel').classList.add('active');

                const nextVoiceKey = currentLevel === 1 ? 'voice_k2' : 'voice_k3';
                setTimeout(() => {
                    playVoiceThenUnlock(nextVoiceKey, 'nextLevelBtn', 2000);
                }, 800);
            } else {
                finishGame();
            }
        }

        function onBetweenLevelClick() {
            playSfx('click');
            startLevel(currentLevel + 1);
        }

        function startLevel(level) {
            stopCurrentLevel();

            currentLevel = level;
            scores[currentLevel] = 0;

            // 第一關開始時重置正確率計數
            if (level === 1) {
                totalFoods = 0;
                correctCount = 0;
            }

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const gc = document.getElementById('gameContainer');
            gc.style.backgroundImage = `url('${GAME_BG[0]}')`;
            gc.classList.add('active');

            // FIX 6: only resize canvas when dimensions actually changed to avoid wiping ctx state mid-game
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            const tipTitles = ["", "第一關：優質蛋白質 🥩", "第二關：新鮮蔬菜 🥦", "第三關：健康澱粉 🍚"];
            const tipSubs  = ["",
                "切正確的蛋白質食物！其他都不要切",
                "切新鮮蔬菜！其他都不要切",
                "切健康澱粉食物！其他都不要切"
            ];
            document.querySelector('#game-tips .title').textContent   = tipTitles[currentLevel];
            document.querySelector('#game-tips .subtitle').textContent = tipSubs[currentLevel];

            // 所有關卡語音都在各自說明/過渡頁播完，進遊戲不重複播

            gameItems = [];
            slashPoints = [];
            isGaming = true;

            // FIX 2: only start loop if not already running
            if (!loopRunning) {
                loopRunning = true;
                requestAnimationFrame(updateLoop);
            }

            spawnTimerId = setInterval(() => {
                if (isGaming) spawnFood();
            }, 2000);

            levelEndTimerId = setTimeout(() => {
                stopCurrentLevel();
                setTimeout(() => showBetweenLevel(), 600);
            }, 30000);
        }

        // ── 食物資料庫（emoji → 中文名稱）──────────────────────────
        const FOOD_NAMES = {
            "🐟":"鮭魚","🦐":"蝦子","🐠":"旗魚",
            "🍗":"雞肉","🥚":"雞蛋","🥩":"瘦牛肉","🥛":"鮮乳","🍶":"優格",
            "🧀":"起司","🦪":"牡蠣","🥜":"花生",
            "🥦":"花椰菜","🥕":"紅蘿蔔","🥬":"青菜","🍅":"番茄",
            "🧅":"洋蔥","🥒":"小黃瓜","🌿":"菠菜","🍄":"香菇",
            "🍠":"地瓜","🥔":"馬鈴薯","🎃":"南瓜","🌽":"玉米","🥣":"燕麥","🍚":"糙米",
            "🫓":"雜糧餅","🍞":"全麥麵包","🌾":"藜麥",
            "🌭":"熱狗","🍔":"漢堡","🥓":"培根","🍟":"薯條",
            "🍰":"蛋糕","🍩":"甜甜圈","🧁":"杯子蛋糕","🍪":"餅乾"
        };

        // 每關正確食物
        const LEVEL_CORRECT = [
            null,
            ["🐟","🦐","🐠","🍗","🥚","🥩","🥛","🍶","🧀","🦪","🥜"],
            ["🥦","🥕","🥬","🍅","🧅","🥒","🌿","🍄"],
            ["🍠","🥔","🎃","🌽","🥣","🍚","🫓","🍞","🌾"]
        ];

        const BAD_FOODS = ["🌭","🍔","🥓","🍟","🍰","🍩","🧁","🍪"];

        function buildWrongPool(level) {
            let pool = [...BAD_FOODS];
            for (let l = 1; l <= 3; l++) {
                if (l !== level) pool = pool.concat(LEVEL_CORRECT[l]);
            }
            return pool;
        }
        const WRONG_POOL = [null, buildWrongPool(1), buildWrongPool(2), buildWrongPool(3)];

        let floatingTexts = [];
        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, alpha: 1.0, vy: -2.0 });
        }

        // 動態背景（bg0=等待, bg1=切對, bg2=切其他健康食物, bg3=切壞食物）
        const GAME_BG = [
            `${BASE}images/bg0.jpg`,
            `${BASE}images/bg1.jpg`,
            `${BASE}images/bg2.jpg`,
            `${BASE}images/bg3.jpg`
        ];
        let bgResetTimer = null;
        function setGameBg(idx) {
            document.getElementById('gameContainer').style.backgroundImage = `url('${GAME_BG[idx]}')`;
            if (bgResetTimer) clearTimeout(bgResetTimer);
            if (idx !== 0) {
                bgResetTimer = setTimeout(() => {
                    document.getElementById('gameContainer').style.backgroundImage = `url('${GAME_BG[0]}')`;
                }, 1500);
            }
        }

        function spawnFood() {
            const isWrong = Math.random() < 0.2;
            const pool = isWrong ? WRONG_POOL[currentLevel] : LEVEL_CORRECT[currentLevel];
            const emoji = pool[Math.floor(Math.random() * pool.length)];
            const isBad = BAD_FOODS.includes(emoji);

            const FOOD_SIZE = 90;
            const margin = FOOD_SIZE + 20;

            // X 出發點：全寬隨機，確保不超出邊界
            const x = margin + Math.random() * (canvas.width - margin * 2);

            // 從頂部開始，緩慢往下掉落（固定速度，無重力加速）
            const fallSpeed = 0.6 + Math.random() * 0.4; // 每幀 0.6~1.0 px

            // 輕微左右漂移
            const vx = (Math.random() - 0.5) * 0.8;

            gameItems.push({
                x: x,
                y: -FOOD_SIZE,
                vy: fallSpeed,
                vx: vx,
                gravity: 0,
                emoji: emoji,
                label: FOOD_NAMES[emoji] || "",
                isWrong: isWrong,
                isBad: isBad,
                sliced: false,
                fadeAlpha: 1.0
            });
        }

        function updateLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFlash();

            // --- Slash trail ---
            if (slashPoints.length > 1) {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "white";
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 12;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(slashPoints[0].x, slashPoints[0].y);
                for (let i = 1; i < slashPoints.length; i++) {
                    ctx.lineTo(slashPoints[i].x, slashPoints[i].y);
                }
                ctx.stroke();
                ctx.restore();
                slashPoints.shift();
            }

            // --- Items ---
            for (let i = gameItems.length - 1; i >= 0; i--) {
                const it = gameItems[i];
                it.y += it.vy;
                it.x += it.vx;
                it.vy += (it.gravity ?? 0.22);

                // 輕微左右漂移，到邊界就反向
                const FSIZE = 50;
                if (it.x < FSIZE || it.x > canvas.width - FSIZE) { it.vx *= -1; }

                ctx.textAlign = "center";

                if (it.sliced) {
                    it.fadeAlpha = Math.max(0, it.fadeAlpha - 0.022);
                    ctx.globalAlpha = it.fadeAlpha;
                    ctx.font = "90px Arial";
                    ctx.fillText(it.emoji, it.x - 35, it.y);
                    ctx.fillText(it.emoji, it.x + 35, it.y);
                    ctx.globalAlpha = 1.0;
                    if (it.fadeAlpha <= 0 || it.y > canvas.height + 100) {
                        gameItems.splice(i, 1);
                    }
                } else {
                    ctx.font = "90px Arial";
                    ctx.fillText(it.emoji, it.x, it.y);

                    // 食物名稱標籤（白底圓角，大字）
                    if (it.label) {
                        ctx.font = "bold 34px sans-serif";
                        const tw = ctx.measureText(it.label).width;
                        const pad = 12, labelY = it.y + 18;
                        ctx.save();
                        ctx.fillStyle = "rgba(255,255,255,0.95)";
                        ctx.beginPath();
                        ctx.roundRect(it.x - tw/2 - pad, labelY - 28, tw + pad*2, 40, 10);
                        ctx.fill();
                        ctx.fillStyle = "#000";
                        ctx.fillText(it.label, it.x, labelY);
                        ctx.restore();
                    }

                    if (it.y > canvas.height + 100) {
                        // 食物掉落離開畫面，計算正確率
                        if (!it.sliced) {
                            totalFoods++;
                            if (it.isWrong) correctCount++; // 壞食物沒切 = 正確
                            // 好食物沒切 = 錯誤，不加 correctCount
                        }
                        gameItems.splice(i, 1);
                    }
                }
            }

            // --- Floating score texts ---
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.alpha = Math.max(0, ft.alpha - 0.022);
                ctx.save();
                ctx.globalAlpha = ft.alpha;
                ctx.font = "bold 48px sans-serif";
                ctx.textAlign = "center";
                ctx.fillStyle = ft.color;
                ctx.shadowColor = "white";
                ctx.shadowBlur = 8;
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }

            // --- Score display（右上角大字帶底框）---
            const levelNames = { 1: '🥩 蛋白質', 2: '🥦 蔬菜', 3: '🍚 澱粉' };
            const levelName = levelNames[currentLevel] || '';
            ctx.save();
            const scoreText = "得分：" + scores[currentLevel];
            ctx.font = "bold 52px sans-serif";
            const sw = ctx.measureText(scoreText).width;
            // 關卡名稱（左側小標）
            ctx.font = "bold 36px sans-serif";
            const lw = ctx.measureText(levelName).width;
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.beginPath();
            ctx.roundRect(canvas.width - sw - lw - 60, 12, lw + 28, 62, 12);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "left";
            ctx.shadowColor = "rgba(0,0,0,0.7)";
            ctx.shadowBlur = 4;
            ctx.fillText(levelName, canvas.width - sw - lw - 46, 58);
            // 得分（右側）
            ctx.font = "bold 52px sans-serif";
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.beginPath();
            ctx.roundRect(canvas.width - sw - 36, 12, sw + 28, 62, 12);
            ctx.fill();
            ctx.fillStyle = "#ffe066";
            ctx.textAlign = "right";
            ctx.fillText(scoreText, canvas.width - 22, 62);
            ctx.restore();

            // FIX 2: keep loop alive while gaming OR while items/trail still visible
            if (isGaming || gameItems.length > 0 || slashPoints.length > 0 || floatingTexts.length > 0) {
                requestAnimationFrame(updateLoop);
            } else {
                loopRunning = false;
            }
        }

        // --- FIX 4: Unified pointer handling (touch + mouse) ---
        let pointerStartX = 0, pointerStartY = 0;

        function onPointerStart(x, y) {
            isPointerDown = true;
            pointerStartX = x;
            pointerStartY = y;
            slashPoints = [];
        }

        function sliceAt(x, y) {
            for (const it of gameItems) {
                if (!it.sliced && Math.hypot(it.x - x, it.y - y) < 70) {
                    it.sliced = true;
                    totalFoods++;
                    if (it.isWrong) {
                        scores[currentLevel] = Math.max(0, scores[currentLevel] - 10);
                        if (it.isBad) {
                            spawnFloatingText(it.x, it.y - 70, "-10 ❌", "#e74c3c");
                            flashScreen("rgba(231,76,60,0.3)");
                            setGameBg(3);
                            playSfx('bad');
                            if (Math.random() < 0.4) speak('voice_bad1');
                        } else {
                            spawnFloatingText(it.x, it.y - 70, "-10 ⚠️", "#e67e22");
                            flashScreen("rgba(230,126,34,0.25)");
                            setGameBg(2);
                            playSfx('wrong');
                            if (Math.random() < 0.35) {
                                const keys = ['voice_wrong1', 'voice_wrong2'];
                                speak(keys[Math.floor(Math.random() * keys.length)]);
                            }
                        }
                    } else {
                        correctCount++; // 好食物切到 = 正確
                        scores[currentLevel] += 10;
                        spawnFloatingText(it.x, it.y - 70, "+10 ✨", "#27ae60");
                        setGameBg(1);
                        playSfx('catch');
                        if (Math.random() < 0.25) {
                            const keys = ['voice_good1', 'voice_good2'];
                            speak(keys[Math.floor(Math.random() * keys.length)]);
                        }
                    }
                }
            }
        }

        function onPointerMove(x, y) {
            if (!isPointerDown) return;
            slashPoints.push({ x, y });
            sliceAt(x, y);
        }

        function onPointerEnd(x, y) {
            isPointerDown = false;
            // 點按判斷：移動距離 < 30px 視為點擊，直接切割點按位置
            if (x !== undefined && y !== undefined) {
                const dist = Math.hypot(x - pointerStartX, y - pointerStartY);
                if (dist < 30) {
                    sliceAt(x, y);
                }
            }
        }

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            onPointerStart(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            onPointerMove(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const t = e.changedTouches[0];
            onPointerEnd(t.clientX, t.clientY);
        }, { passive: false });

        // FIX 4: Mouse events for desktop support
        canvas.addEventListener('mousedown', (e) => onPointerStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', (e) => onPointerEnd(e.clientX, e.clientY));
        canvas.addEventListener('mouseleave', (e) => onPointerEnd(e.clientX, e.clientY));

        // Red/flash overlay for wrong food
        let flashAlpha = 0;
        let flashColor = "rgba(231,76,60,0.35)";
        function flashScreen(color) {
            flashAlpha = 1.0;
            flashColor = color;
        }
        // Draw flash in updateLoop — inject just before score display
        // (handled inline below via the flashAlpha variable)

        function drawFlash() {
            if (flashAlpha <= 0) return;
            ctx.save();
            ctx.globalAlpha = flashAlpha;
            ctx.fillStyle = flashColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            flashAlpha = Math.max(0, flashAlpha - 0.06);
        }

        function finishGame() {
            stopBgm();
            const accuracy = totalFoods > 0 ? Math.round((correctCount / totalFoods) * 100) : 0;
            const resKey = accuracy >= 80 ? 'result1' : (accuracy >= 50 ? 'result2' : 'result3');
            const sfxName = accuracy >= 80 ? 'perfect' : (accuracy >= 50 ? 'normal' : 'ended');
            showScreen('result', resKey);
            const scoreColors = { result1: '#1a5fa8', result2: '#1a7a2e', result3: '#c0392b' };
            const scoreEl = document.getElementById('result-score');
            scoreEl.textContent = accuracy + '%';
            scoreEl.style.color = scoreColors[resKey];
            scoreEl.style.textShadow = `2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white`;
            setTimeout(() => {
                if (!actx || !sfxBuffers[sfxName]) return;
                try {
                    const src = actx.createBufferSource();
                    src.buffer = sfxBuffers[sfxName];
                    const gain = actx.createGain();
                    gain.gain.value = 0.3;
                    src.connect(gain).connect(actx.destination);
                    src.start(0);
                    // 5 秒後開始漸弱，1 秒內淡出
                    gain.gain.setValueAtTime(0.3, actx.currentTime + 5);
                    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 6);
                    src.stop(actx.currentTime + 6);
                } catch(e) { console.warn('result sfx err', e); }
            }, 300);
            const voiceKey = total >= 80 ? 'voice_perfect' : (total >= 40 ? 'voice_normal' : 'voice_ended');
            setTimeout(() => speak(voiceKey), 800);
        }

        // Handle window resize gracefully
        window.addEventListener('resize', () => {
            if (document.getElementById('gameContainer').classList.contains('active')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
